<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <filter id="tileShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="tileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#181825"/>
      <stop offset="100%" style="stop-color:#1e1e2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" rx="12" ry="12" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="300" y="35" text-anchor="middle" fill="#cdd6f4" font-size="18" font-weight="bold" font-family="sans-serif">Comprehensive SEO Audit</text>
  <text x="300" y="55" text-anchor="middle" fill="#585b70" font-size="11" font-family="sans-serif">24+ detection points covering every aspect of your site</text>

  <!-- Grid layout: 3 columns x 2 rows + bottom row of 3 -->
  <!-- Row 1 -->
  <!-- Tile 1: Title Tags -->
  <g transform="translate(12, 72)" filter="url(#tileShadow)">
    <rect x="0" y="0" width="138" height="96" rx="10" fill="url(#tileGrad)" stroke="#313244" stroke-width="1.2"/>
    <!-- Icon -->
    <g transform="translate(12, 12)">
      <rect x="0" y="0" width="28" height="20" rx="3" fill="none" stroke="#89b4fa" stroke-width="1.5"/>
      <text x="14" y="14" text-anchor="middle" fill="#89b4fa" font-size="9" font-weight="bold" font-family="sans-serif">H1</text>
    </g>
    <text x="52" y="20" fill="#cdd6f4" font-size="10" font-weight="bold" font-family="sans-serif">Title Tags</text>
    <text x="12" y="38" fill="#585b70" font-size="8" font-family="sans-serif">Title length, keyword</text>
    <text x="12" y="50" fill="#585b70" font-size="8" font-family="sans-serif">placement, branding</text>
    <rect x="12" y="62" width="114" height="4" rx="2" fill="#313244"/>
    <rect x="12" y="62" width="85" height="4" rx="2" fill="#a6e3a1" opacity="0.7"/>
  </g>

  <!-- Tile 2: Meta Description -->
  <g transform="translate(156, 72)" filter="url(#tileShadow)">
    <rect x="0" y="0" width="138" height="96" rx="10" fill="url(#tileGrad)" stroke="#313244" stroke-width="1.2"/>
    <g transform="translate(12, 12)">
      <rect x="0" y="0" width="28" height="20" rx="3" fill="none" stroke="#a6e3a1" stroke-width="1.5"/>
      <line x1="5" y1="8" x2="23" y2="8" stroke="#a6e3a1" stroke-width="1.5"/>
      <line x1="5" y1="13" x2="18" y2="13" stroke="#a6e3a1" stroke-width="1.5"/>
    </g>
    <text x="52" y="20" fill="#cdd6f4" font-size="10" font-weight="bold" font-family="sans-serif">Meta Description</text>
    <text x="12" y="38" fill="#585b70" font-size="8" font-family="sans-serif">Meta tag quality,</text>
    <text x="12" y="50" fill="#585b70" font-size="8" font-family="sans-serif">length, CTR opt.</text>
    <rect x="12" y="62" width="114" height="4" rx="2" fill="#313244"/>
    <rect x="12" y="62" width="90" height="4" rx="2" fill="#a6e3a1" opacity="0.7"/>
  </g>

  <!-- Tile 3: Headings -->
  <g transform="translate(300, 72)" filter="url(#tileShadow)">
    <rect x="0" y="0" width="138" height="96" rx="10" fill="url(#tileGrad)" stroke="#313244" stroke-width="1.2"/>
    <g transform="translate(12, 12)">
      <text x="14" y="10" text-anchor="middle" fill="#fab387" font-size="6" font-family="sans-serif">H2</text>
      <text x="14" y="18" text-anchor="middle" fill="#fab387" font-size="6" font-family="sans-serif">H3</text>
    </g>
    <text x="52" y="20" fill="#cdd6f4" font-size="10" font-weight="bold" font-family="sans-serif">Headings</text>
    <text x="12" y="38" fill="#585b70" font-size="8" font-family="sans-serif">H1-H6 structure,</text>
    <text x="12" y="50" fill="#585b70" font-size="8" font-family="sans-serif">hierarchy, keyword</text>
    <rect x="12" y="62" width="114" height="4" rx="2" fill="#313244"/>
    <rect x="12" y="62" width="78" height="4" rx="2" fill="#fab387" opacity="0.7"/>
  </g>

  <!-- Tile 4: Links -->
  <g transform="translate(444, 72)" filter="url(#tileShadow)">
    <rect x="0" y="0" width="144" height="96" rx="10" fill="url(#tileGrad)" stroke="#313244" stroke-width="1.2"/>
    <g transform="translate(12, 12)">
      <line x1="0" y1="5" x2="14" y2="5" stroke="#f38ba8" stroke-width="1.5"/>
      <line x1="0" y1="10" x2="20" y2="10" stroke="#f38ba8" stroke-width="1.5"/>
      <line x1="0" y1="15" x2="16" y2="15" stroke="#f38ba8" stroke-width="1.5"/>
      <polygon points="22,10 28,7 28,13" fill="#f38ba8"/>
    </g>
    <text x="52" y="20" fill="#cdd6f4" font-size="10" font-weight="bold" font-family="sans-serif">Links</text>
    <text x="12" y="38" fill="#585b70" font-size="8" font-family="sans-serif">Internal/external,</text>
    <text x="12" y="50" fill="#585b70" font-size="8" font-family="sans-serif">broken links, anchor</text>
    <rect x="12" y="62" width="120" height="4" rx="2" fill="#313244"/>
    <rect x="12" y="62" width="60" height="4" rx="2" fill="#f38ba8" opacity="0.7"/>
  </g>

  <!-- Row 2 -->
  <!-- Tile 5: Images -->
  <g transform="translate(12, 178)" filter="url(#tileShadow)">
    <rect x="0" y="0" width="138" height="96" rx="10" fill="url(#tileGrad)" stroke="#313244" stroke-width="1.2"/>
    <g transform="translate(12, 12)">
      <rect x="0" y="0" width="22" height="18" rx="2" fill="none" stroke="#89b4fa" stroke-width="1.5"/>
      <circle cx="11" cy="8" r="3" fill="none" stroke="#89b4fa" stroke-width="1"/>
      <polygon points="3,14 8,9 13,14 18,9" fill="none" stroke="#89b4fa" stroke-width="1"/>
    </g>
    <text x="52" y="20" fill="#cdd6f4" font-size="10" font-weight="bold" font-family="sans-serif">Images &amp; Alt</text>
    <text x="12" y="38" fill="#585b70" font-size="8" font-family="sans-serif">Alt text, lazy load,</text>
    <text x="12" y="50" fill="#585b70" font-size="8" font-family="sans-serif">file size, format</text>
    <rect x="12" y="62" width="114" height="4" rx="2" fill="#313244"/>
    <rect x="12" y="62" width="72" height="4" rx="2" fill="#89b4fa" opacity="0.7"/>
  </g>

  <!-- Tile 6: Structured Data -->
  <g transform="translate(156, 178)" filter="url(#tileShadow)">
    <rect x="0" y="0" width="138" height="96" rx="10" fill="url(#tileGrad)" stroke="#313244" stroke-width="1.2"/>
    <g transform="translate(12, 12)">
      <text x="14" y="10" text-anchor="middle" fill="#a6e3a1" font-size="7" font-weight="bold" font-family="monospace">{ }</text>
      <text x="14" y="18" text-anchor="middle" fill="#a6e3a1" font-size="5" font-family="monospace">schema</text>
    </g>
    <text x="52" y="20" fill="#cdd6f4" font-size="10" font-weight="bold" font-family="sans-serif">Structured Data</text>
    <text x="12" y="38" fill="#585b70" font-size="8" font-family="sans-serif">Schema markup,</text>
    <text x="12" y="50" fill="#585b70" font-size="8" font-family="sans-serif">JSON-LD, validation</text>
    <rect x="12" y="62" width="114" height="4" rx="2" fill="#313244"/>
    <rect x="12" y="62" width="82" height="4" rx="2" fill="#a6e3a1" opacity="0.7"/>
  </g>

  <!-- Tile 7: Performance -->
  <g transform="translate(300, 178)" filter="url(#tileShadow)">
    <rect x="0" y="0" width="138" height="96" rx="10" fill="url(#tileGrad)" stroke="#313244" stroke-width="1.2"/>
    <g transform="translate(12, 12)">
      <rect x="0" y="10" width="24" height="8" rx="1" fill="none" stroke="#fab387" stroke-width="1.5"/>
      <rect x="2" y="12" width="6" height="4" fill="#fab387"/>
      <rect x="10" y="10" width="4" height="6" fill="#fab387"/>
      <rect x="16" y="7" width="4" height="9" fill="#fab387"/>
    </g>
    <text x="52" y="20" fill="#cdd6f4" font-size="10" font-weight="bold" font-family="sans-serif">Performance</text>
    <text x="12" y="38" fill="#585b70" font-size="8" font-family="sans-serif">Core Web Vitals,</text>
    <text x="12" y="50" fill="#585b70" font-size="8" font-family="sans-serif">speed, LCP, FID</text>
    <rect x="12" y="62" width="114" height="4" rx="2" fill="#313244"/>
    <rect x="12" y="62" width="65" height="4" rx="2" fill="#fab387" opacity="0.7"/>
  </g>

  <!-- Tile 8: Mobile -->
  <g transform="translate(444, 178)" filter="url(#tileShadow)">
    <rect x="0" y="0" width="144" height="96" rx="10" fill="url(#tileGrad)" stroke="#313244" stroke-width="1.2"/>
    <g transform="translate(12, 10)">
      <rect x="0" y="0" width="14" height="22" rx="2" fill="none" stroke="#89b4fa" stroke-width="1.5"/>
      <circle cx="7" cy="19" r="1.5" fill="#89b4fa"/>
    </g>
    <text x="52" y="20" fill="#cdd6f4" font-size="10" font-weight="bold" font-family="sans-serif">Mobile SEO</text>
    <text x="12" y="38" fill="#585b70" font-size="8" font-family="sans-serif">Mobile-friendly,</text>
    <text x="12" y="50" fill="#585b70" font-size="8" font-family="sans-serif">viewport, tap targets</text>
    <rect x="12" y="62" width="120" height="4" rx="2" fill="#313244"/>
    <rect x="12" y="62" width="88" height="4" rx="2" fill="#89b4fa" opacity="0.7"/>
  </g>

  <!-- Bottom more indicator -->
  <g transform="translate(0, 295)">
    <text x="300" y="20" text-anchor="middle" fill="#585b70" font-size="9" font-family="sans-serif">and 16+ more detection points...</text>
    <g transform="translate(280, 28)">
      <circle cx="0" cy="0" r="3" fill="#313244"/>
      <circle cx="12" cy="0" r="3" fill="#313244"/>
      <circle cx="24" cy="0" r="3" fill="#313244"/>
      <circle cx="0" cy="0" r="3" fill="#89b4fa" opacity="0.5"/>
    </g>
  </g>

  <!-- Decorative elements -->
  <g opacity="0.06">
    <rect x="15" y="340" width="570" height="1" fill="#89b4fa"/>
  </g>
</svg>
