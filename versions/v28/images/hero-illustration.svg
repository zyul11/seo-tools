<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89b4fa;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#89b4fa;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89b4fa"/>
      <stop offset="100%" style="stop-color:#a6e3a1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#89b4fa" flood-opacity="0.3"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="12" ry="12" fill="#1e1e2e"/>

  <!-- Decorative grid lines -->
  <g opacity="0.04" stroke="#cdd6f4" stroke-width="1" fill="none">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>

  <!-- Website box being scanned -->
  <g transform="translate(100, 100)">
    <!-- Browser window -->
    <rect x="0" y="0" width="340" height="220" rx="8" fill="#181825" stroke="#313244" stroke-width="1.5"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="340" height="32" rx="8" fill="#313244"/>
    <rect x="0" y="16" width="340" height="16" fill="#313244"/>
    <!-- Window dots -->
    <circle cx="14" cy="16" r="5" fill="#f38ba8"/>
    <circle cx="32" cy="16" r="5" fill="#fab387"/>
    <circle cx="50" cy="16" r="5" fill="#a6e3a1"/>
    <!-- URL bar -->
    <rect x="70" y="10" width="200" height="14" rx="7" fill="#1e1e2e"/>
    <text x="170" y="20" text-anchor="middle" fill="#585b70" font-size="8" font-family="monospace">seo.textools.site</text>

    <!-- Website content -->
    <!-- Hero section -->
    <rect x="15" y="42" width="310" height="30" rx="4" fill="#313244"/>
    <!-- Cards -->
    <rect x="15" y="82" width="95" height="60" rx="4" fill="#313244"/>
    <rect x="120" y="82" width="95" height="60" rx="4" fill="#313244"/>
    <rect x="225" y="82" width="95" height="60" rx="4" fill="#313244"/>
    <!-- Text lines -->
    <rect x="15" y="152" width="200" height="6" rx="3" fill="#313244"/>
    <rect x="15" y="164" width="160" height="6" rx="3" fill="#313244"/>
    <rect x="15" y="176" width="180" height="6" rx="3" fill="#313244"/>
    <rect x="15" y="190" width="120" height="6" rx="3" fill="#313244"/>
    <!-- Footer -->
    <rect x="15" y="202" width="310" height="8" rx="4" fill="#313244"/>

    <!-- Scan lines overlay -->
    <g opacity="0.08">
      <line x1="0" y1="0" x2="340" y2="0" stroke="#89b4fa" stroke-width="1"/>
      <line x1="0" y1="4" x2="340" y2="4" stroke="#89b4fa" stroke-width="1"/>
      <line x1="0" y1="8" x2="340" y2="8" stroke="#89b4fa" stroke-width="1"/>
      <line x1="0" y1="12" x2="340" y2="12" stroke="#89b4fa" stroke-width="1"/>
    </g>
  </g>

  <!-- Scanning beam from magnifying glass -->
  <g opacity="0.12">
    <polygon points="420,70 480,350 340,350" fill="url(#glow)"/>
  </g>

  <!-- Magnifying glass -->
  <g transform="translate(420, 60)" filter="url(#shadow)">
    <!-- Handle -->
    <rect x="58" y="98" width="12" height="60" rx="6" fill="#585b70" transform="rotate(45, 64, 128)"/>
    <!-- Glass rim -->
    <circle cx="0" cy="0" r="65" fill="none" stroke="#89b4fa" stroke-width="3" opacity="0.6"/>
    <circle cx="0" cy="0" r="62" fill="#1e1e2e" stroke="#89b4fa" stroke-width="2" opacity="0.4"/>
    <!-- Glass inner glow -->
    <circle cx="0" cy="0" r="55" fill="#89b4fa" opacity="0.05"/>
    <!-- Search icon inside glass -->
    <g transform="translate(-18, -18)" opacity="0.3">
      <circle cx="18" cy="18" r="14" fill="none" stroke="#cdd6f4" stroke-width="2"/>
      <line x1="28" y1="28" x2="36" y2="36" stroke="#cdd6f4" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <!-- Scan dots -->
    <circle cx="-20" cy="-20" r="2" fill="#89b4fa" opacity="0.6"/>
    <circle cx="10" cy="-15" r="1.5" fill="#a6e3a1" opacity="0.5"/>
    <circle cx="-5" cy="25" r="1.5" fill="#89b4fa" opacity="0.4"/>
    <circle cx="20" cy="10" r="1" fill="#cdd6f4" opacity="0.3"/>
  </g>

  <!-- Score ring -->
  <g transform="translate(660, 155)">
    <!-- Background ring -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#313244" stroke-width="12"/>
    <!-- Score arc - 85% -->
    <path d="M 0,-70 A 70,70 0 1,1 -60.6,35"
          fill="none" stroke="url(#ringGrad)" stroke-width="12" stroke-linecap="round"/>
    <!-- Score text -->
    <text x="0" y="-8" text-anchor="middle" fill="#cdd6f4" font-size="36" font-weight="bold" font-family="sans-serif">85</text>
    <text x="0" y="18" text-anchor="middle" fill="#585b70" font-size="12" font-family="sans-serif">SEO Score</text>
    <!-- Small tags around ring -->
    <g font-family="sans-serif" font-size="8" fill="#585b70">
      <text x="0" y="-82" text-anchor="middle" fill="#a6e3a1">Meta</text>
      <text x="78" y="4" text-anchor="start" fill="#89b4fa">Content</text>
      <text x="-78" y="4" text-anchor="end" fill="#f38ba8">Links</text>
    </g>
  </g>

  <!-- Decorative dots -->
  <g opacity="0.15">
    <circle cx="50" cy="350" r="3" fill="#89b4fa"/>
    <circle cx="750" cy="50" r="2" fill="#a6e3a1"/>
    <circle cx="400" cy="380" r="2" fill="#89b4fa"/>
    <circle cx="200" cy="50" r="1.5" fill="#cdd6f4"/>
  </g>

  <!-- Connection lines between magnifier and score -->
  <g opacity="0.1" stroke="#89b4fa" stroke-width="1" stroke-dasharray="4,4" fill="none">
    <path d="M 485,125 Q 560,140 590,155"/>
  </g>
</svg>
