<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="stepGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89b4fa"/>
      <stop offset="100%" style="stop-color:#74c7ec"/>
    </linearGradient>
    <linearGradient id="stepGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89b4fa"/>
      <stop offset="100%" style="stop-color:#a6e3a1"/>
    </linearGradient>
    <linearGradient id="stepGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a6e3a1"/>
      <stop offset="100%" style="stop-color:#89b4fa"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0,0 L 10,5 L 0,10 Z" fill="#89b4fa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" rx="12" ry="12" fill="#1e1e2e"/>

  <!-- Subtle background pattern -->
  <g opacity="0.03">
    <circle cx="100" cy="100" r="80" fill="#89b4fa"/>
    <circle cx="500" cy="300" r="100" fill="#a6e3a1"/>
  </g>

  <!-- Title -->
  <text x="300" y="45" text-anchor="middle" fill="#cdd6f4" font-size="20" font-weight="bold" font-family="sans-serif">How It Works</text>
  <line x1="230" y1="56" x2="370" y2="56" stroke="#89b4fa" stroke-width="2" opacity="0.6"/>

  <!-- Step 1 -->
  <g transform="translate(30, 80)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="150" height="240" rx="12" fill="#181825" stroke="#313244" stroke-width="1.5"/>
    <!-- Step number badge -->
    <circle cx="75" cy="20" r="16" fill="url(#stepGrad1)"/>
    <text x="75" y="25" text-anchor="middle" fill="#1e1e2e" font-size="14" font-weight="bold" font-family="sans-serif">1</text>
    <!-- Icon: URL input -->
    <g transform="translate(37, 55)">
      <rect x="0" y="0" width="76" height="44" rx="6" fill="#313244"/>
      <rect x="0" y="0" width="76" height="44" rx="6" fill="#89b4fa" opacity="0.1"/>
      <text x="38" y="18" text-anchor="middle" fill="#585b70" font-size="7" font-family="monospace">www.example.com</text>
      <line x1="10" y1="28" x2="66" y2="28" stroke="#313244" stroke-width="2"/>
      <!-- Go button -->
      <rect x="56" y="-14" width="18" height="12" rx="3" fill="#89b4fa"/>
      <text x="65" y="-6" text-anchor="middle" fill="#1e1e2e" font-size="7" font-weight="bold" font-family="sans-serif">GO</text>
      <!-- Cursor -->
      <polygon points="10,-10 15,-5 10,-2" fill="#cdd6f4" opacity="0.5"/>
    </g>
    <!-- Description -->
    <text x="75" y="130" text-anchor="middle" fill="#cdd6f4" font-size="12" font-weight="bold" font-family="sans-serif">Enter Your URL</text>
    <text x="75" y="148" text-anchor="middle" fill="#585b70" font-size="10" font-family="sans-serif">Paste your website</text>
    <text x="75" y="162" text-anchor="middle" fill="#585b70" font-size="10" font-family="sans-serif">URL and click</text>
    <text x="75" y="176" text-anchor="middle" fill="#585b70" font-size="10" font-family="sans-serif">the start button</text>

    <!-- Decorative input cursor blink -->
    <g opacity="0.3">
      <rect x="50" y="8" width="2" height="14" fill="#cdd6f4"/>
    </g>
  </g>

  <!-- Arrow 1→2 -->
  <g transform="translate(180, 200)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#89b4fa" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  </g>

  <!-- Step 2 -->
  <g transform="translate(225, 80)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="150" height="240" rx="12" fill="#181825" stroke="#313244" stroke-width="1.5"/>
    <!-- Step number badge -->
    <circle cx="75" cy="20" r="16" fill="url(#stepGrad2)"/>
    <text x="75" y="25" text-anchor="middle" fill="#1e1e2e" font-size="14" font-weight="bold" font-family="sans-serif">2</text>
    <!-- Icon: AI Analysis visualization -->
    <g transform="translate(25, 52)">
      <!-- Brain/processor icon -->
      <circle cx="50" cy="28" r="20" fill="none" stroke="#89b4fa" stroke-width="1.5" opacity="0.4"/>
      <circle cx="50" cy="28" r="12" fill="#89b4fa" opacity="0.15"/>
      <!-- Data nodes -->
      <circle cx="20" cy="10" r="5" fill="#89b4fa" opacity="0.5"/>
      <circle cx="80" cy="10" r="5" fill="#a6e3a1" opacity="0.5"/>
      <circle cx="10" cy="35" r="4" fill="#f38ba8" opacity="0.4"/>
      <circle cx="90" cy="35" r="4" fill="#fab387" opacity="0.4"/>
      <circle cx="50" cy="48" r="3" fill="#89b4fa" opacity="0.3"/>
      <!-- Connection lines -->
      <line x1="25" y1="12" x2="40" y2="20" stroke="#89b4fa" stroke-width="0.8" opacity="0.3"/>
      <line x1="60" y1="20" x2="75" y2="12" stroke="#a6e3a1" stroke-width="0.8" opacity="0.3"/>
      <line x1="40" y1="32" x2="15" y2="36" stroke="#f38ba8" stroke-width="0.8" opacity="0.3"/>
      <line x1="60" y1="32" x2="85" y2="36" stroke="#fab387" stroke-width="0.8" opacity="0.3"/>
      <!-- "24+" label on chip -->
      <rect x="32" y="42" width="36" height="14" rx="7" fill="#89b4fa" opacity="0.2"/>
      <text x="50" y="52" text-anchor="middle" fill="#89b4fa" font-size="7" font-weight="bold" font-family="sans-serif">24+</text>
    </g>
    <!-- Description -->
    <text x="75" y="130" text-anchor="middle" fill="#cdd6f4" font-size="12" font-weight="bold" font-family="sans-serif">AI Analyzes</text>
    <text x="75" y="148" text-anchor="middle" fill="#585b70" font-size="10" font-family="sans-serif">Advanced AI scans</text>
    <text x="75" y="162" text-anchor="middle" fill="#585b70" font-size="10" font-family="sans-serif">24+ SEO checkpoints</text>
    <text x="75" y="176" text-anchor="middle" fill="#585b70" font-size="10" font-family="sans-serif">in seconds</text>
  </g>

  <!-- Arrow 2→3 -->
  <g transform="translate(375, 200)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#89b4fa" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  </g>

  <!-- Step 3 -->
  <g transform="translate(420, 80)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="150" height="240" rx="12" fill="#181825" stroke="#313244" stroke-width="1.5"/>
    <!-- Step number badge -->
    <circle cx="75" cy="20" r="16" fill="url(#stepGrad3)"/>
    <text x="75" y="25" text-anchor="middle" fill="#1e1e2e" font-size="14" font-weight="bold" font-family="sans-serif">3</text>
    <!-- Icon: Report with check -->
    <g transform="translate(30, 50)">
      <!-- Report document -->
      <rect x="5" y="5" width="80" height="55" rx="4" fill="none" stroke="#a6e3a1" stroke-width="1.5" opacity="0.4"/>
      <rect x="5" y="5" width="80" height="55" rx="4" fill="#a6e3a1" opacity="0.08"/>
      <!-- Score ring mini -->
      <circle cx="45" cy="22" r="12" fill="none" stroke="#313244" stroke-width="3"/>
      <path d="M 45,10 A 12,12 0 1,1 37.5,31"
            fill="none" stroke="#a6e3a1" stroke-width="3" stroke-linecap="round"/>
      <text x="45" y="25" text-anchor="middle" fill="#a6e3a1" font-size="8" font-weight="bold" font-family="sans-serif">92</text>
      <!-- Check list items -->
      <line x1="15" y1="38" x2="75" y2="38" stroke="#a6e3a1" stroke-width="1.5" opacity="0.4"/>
      <line x1="15" y1="45" x2="65" y2="45" stroke="#a6e3a1" stroke-width="1.5" opacity="0.3"/>
      <line x1="15" y1="52" x2="70" y2="52" stroke="#a6e3a1" stroke-width="1.5" opacity="0.2"/>
    </g>
    <!-- Description -->
    <text x="75" y="130" text-anchor="middle" fill="#cdd6f4" font-size="12" font-weight="bold" font-family="sans-serif">Get Report</text>
    <text x="75" y="148" text-anchor="middle" fill="#585b70" font-size="10" font-family="sans-serif">Detailed SEO report</text>
    <text x="75" y="162" text-anchor="middle" fill="#585b70" font-size="10" font-family="sans-serif">with actionable</text>
    <text x="75" y="176" text-anchor="middle" fill="#585b70" font-size="10" font-family="sans-serif">fix recommendations</text>
  </g>

  <!-- Bottom decorative bar -->
  <g transform="translate(100, 360)">
    <rect x="0" y="0" width="400" height="4" rx="2" fill="#313244"/>
    <rect x="0" y="0" width="100" height="4" rx="2" fill="#89b4fa" opacity="0.6"/>
  </g>

  <!-- Small floating dots -->
  <g opacity="0.12">
    <circle cx="50" cy="360" r="2" fill="#89b4fa"/>
    <circle cx="550" cy="60" r="1.5" fill="#a6e3a1"/>
    <circle cx="300" cy="340" r="2" fill="#89b4fa"/>
  </g>
</svg>
